version: 2

project_name: interloom

builds:
  - id: interloom
    binary: interloom
    main: .
    env:
      - CGO_ENABLED=0
    targets:
      - linux_amd64
      - linux_arm64
      - darwin_arm64
      - linux_arm
      - windows_amd64
    ldflags:
      - -s -w -X github.com/interloom/cli/cmd.version={{.Version}}

archives:
  # tar.gz (zip on Windows) archives for the GitHub release.
  - id: targz
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_v{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
  # Raw binaries, also uploaded to the GitHub release. npm-binary-releaser reads
  # these from the build subdirs via a staging dir (see release.yml).
  - id: binary
    formats: [binary]
    name_template: "{{ .ProjectName }}_v{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  abbrev: -1 # drop the commit hash prefix from each entry
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

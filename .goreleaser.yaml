version: 2

project_name: interloom

builds:
  - id: interloom
    binary: interloom
    main: .
    env:
      - CGO_ENABLED=0
    targets:
      - linux_amd64
      - linux_arm64
      - darwin_arm64
      - linux_arm
      - windows_amd64
    ldflags:
      - -s -w -X github.com/interloom/cli/cmd.version={{.Version}}

archives:
  # Only tar.gz/zip archives are uploaded to the GitHub release. The raw build
  # binaries (dist/<name>_<target>/) are staged separately for the npm publish
  # (see release.yml) and are intentionally not uploaded here.
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_v{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  abbrev: -1 # drop the commit hash prefix from each entry
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Others
      order: 999
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"

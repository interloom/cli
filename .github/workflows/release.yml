name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the GitHub release and upload assets

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history + tags so GoReleaser can build the changelog
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # GoReleaser has no native post-release hook, so publish the binaries that
      # GoReleaser just built to npm as the next step. dist/ also contains the
      # tar.gz/zip archives, so stage just the raw build binaries into npm-dist/
      # for npm-binary-releaser (config in .npm-binary-releaser.yaml). The
      # version comes from the tag.
      - name: Publish to npm
        run: |
          mkdir -p npm-dist
          cp -r dist/interloom_*/ npm-dist/
          go install github.com/christophwitzko/npm-binary-releaser/cmd/npm-binary-releaser@v1.10.1
          "$(go env GOPATH)/bin/npm-binary-releaser" --package-version "${GITHUB_REF_NAME#v}"
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
